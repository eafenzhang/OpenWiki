  <circle cx="135" cy="85" r="3" fill="#F97316" opacity="0.08"/>
  <circle cx="1090" cy="65" r="6" fill="#F97316" opacity="0.10"/>
  <circle cx="1040" cy="42" r="3" fill="#F97316" opacity="0.06"/>
  <circle cx="110" cy="210" r="4" fill="#F97316" opacity="0.08"/>
  <circle cx="1070" cy="200" r="5" fill="#F97316" opacity="0.10"/>

  <!-- Logo circle -->
  <circle cx="556" cy="80" r="32" fill="#F97316"/>
  <text x="556" y="91" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="700" font-size="26" fill="white">W</text>

  <!-- Title: "Open" in dark, "Wiki" in orange -->
