      <stop offset="0%" stop-color="#FFF7ED"/>
      <stop offset="100%" stop-color="#FFEDD5"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="260" rx="16" fill="url(#bg)"/>

  <!-- Decorative dots -->
