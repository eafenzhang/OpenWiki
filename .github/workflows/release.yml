name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-macos:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app (Apple Silicon)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'OpenWiki ${{ github.ref_name }}'
          releaseBody: |
            OpenWiki ${{ github.ref_name }} Released!

            ## Installation (macOS)
            1. Download the `.dmg` file
            2. Open the DMG and drag OpenWiki into the Applications folder
            3. Open Terminal and run `xattr -cr /Applications/OpenWiki.app` to allow the app to run
            4. Launch the app and click "Allow" in the authorization prompt
            5. Go to Settings → AI to configure your AI provider

            ---

            OpenWiki ${{ github.ref_name }} 发布！

            ## 安装说明（macOS）
            1. 打开 `.dmg`，将 OpenWiki 拖入「应用程序」文件夹
            2. **打开终端，执行 `xattr -cr /Applications/OpenWiki.app` ，允许应用运行**
            3. 运行应用，在弹出的授权窗口点击"允许"
            4. 在应用的"设置"->"AI"中配置 AI 提供商信息
          releaseDraft: false
          prerelease: false
          args: --target aarch64-apple-darwin

      - name: Build Tauri app (Intel)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'OpenWiki ${{ github.ref_name }}'
          releaseDraft: false
          prerelease: false
          args: --target x86_64-apple-darwin
