name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-macos:
    name: Build macOS (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      max-parallel: 1
      matrix:
        include:
          - label: Apple Silicon
            os: macos-latest
            rust_target: aarch64-apple-darwin
          - label: Intel
            os: macos-15-intel
            rust_target: x86_64-apple-darwin

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: Prepare bundled document converter
        run: ./src-tauri/scripts/setup_markitdown.sh

      # Read per-version release notes from release-notes/<tag>.md.
      # Claude maintains this file (see release-notes/README.md); if it's
      # missing we fall back to a minimal generic body so the release still
      # publishes successfully.
      - name: Prepare release body
        id: release_body
        shell: bash
        run: |
          TAG="${{ github.ref_name }}"
          NOTES_FILE="release-notes/${TAG}.md"
          EOF_MARKER="RELEASE_BODY_EOF_$(date +%s%N)"
          {
            echo "body<<${EOF_MARKER}"
            if [ -f "$NOTES_FILE" ]; then
              cat "$NOTES_FILE"
            else
              echo "OpenWiki ${TAG} Released!"
              echo ""
              echo "See the repository for details."
            fi
            echo "${EOF_MARKER}"
          } >> "$GITHUB_OUTPUT"

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'OpenWiki ${{ github.ref_name }}'
          releaseBody: ${{ steps.release_body.outputs.body }}
          releaseDraft: false
          prerelease: false
          args: --target ${{ matrix.rust_target }}
